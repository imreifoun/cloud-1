- name: Create application directory
  file:
    path: /opt/cloud-1
    state: directory
    mode: '0755'

- name: Create nginx config directory
  file:
    path: /opt/cloud-1/nginx
    state: directory
    mode: '0755'

- name: Copy AWS docker compose file
  copy:
    src: ../../../docker/docker-compose.aws.yml
    dest: /opt/cloud-1/docker-compose.aws.yml
    mode: '0644'

- name: Copy AWS nginx config
  copy:
    src: ../../../docker/nginx/aws-wordpress.conf
    dest: /opt/cloud-1/nginx/aws-wordpress.conf
    mode: '0644'

- name: Generate AWS env file
  template:
    src: env.aws.j2
    dest: /opt/cloud-1/.env
    mode: '0600'

- name: Start AWS application stack
  command: docker compose --env-file /opt/cloud-1/.env -f /opt/cloud-1/docker-compose.aws.yml up -d
  args:
    chdir: /opt/cloud-1