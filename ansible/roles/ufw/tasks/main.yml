- name: Install UFW
  apt:
    name: ufw
    state: present
    update_cache: yes

- name: Allow SSH
  ufw:
    rule: allow
    port: '22'

- name: Allow HTTP
  ufw:
    rule: allow
    port: '80'

- name: Allow HTTPS
  ufw:
    rule: allow
    port: '443'

- name: Deny all other incoming traffic
  ufw:
    state: enabled
    policy: deny
    direction: incoming
